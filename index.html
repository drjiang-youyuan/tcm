<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>鸿儒中医 · 体质辨识 HongRu TCM Constitution Assessment</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #faf9f6;
    --card: #ffffff;
    --primary: #2d6a4f;
    --primary-light: #d8f3dc;
    --accent: #c17f59;
    --accent-light: #fde8d0;
    --text: #1b1b1b;
    --text-light: #6b7280;
    --border: #e5e5e5;
    --error: #dc2626;
    --error-light: #fef2f2;
    --shadow: 0 2px 16px rgba(0,0,0,0.05);
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6;
    padding-bottom: env(safe-area-inset-bottom, 20px);
    -webkit-font-smoothing: antialiased;
  }

  /* ===== HEADER ===== */
  .header {
    background: linear-gradient(160deg, #1b4332 0%, #2d6a4f 50%, #52796f 100%);
    color: white; padding: 32px 24px 28px; text-align: center; position: relative; overflow: hidden;
  }
  .header::before {
    content: ''; position: absolute; top: -40px; right: -40px; width: 120px; height: 120px;
    background: rgba(255,255,255,0.06); border-radius: 50%;
  }
  .header::after {
    content: ''; position: absolute; bottom: -60px; left: -30px; width: 160px; height: 160px;
    background: rgba(255,255,255,0.04); border-radius: 50%;
  }
  .header .logo { font-size: 36px; margin-bottom: 6px; }
  .header h1 { font-size: 24px; font-weight: 700; letter-spacing: 1px; }
  .header .subtitle { font-size: 13px; opacity: 0.8; margin-top: 4px; }
  .header .badge {
    display: inline-block; margin-top: 12px; padding: 4px 14px; background: rgba(255,255,255,0.15);
    border-radius: 20px; font-size: 11px; letter-spacing: 0.5px; backdrop-filter: blur(4px);
  }

  /* ===== PROGRESS ===== */
  .progress-wrap {
    position: sticky; top: 0; z-index: 100; background: var(--card);
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .progress-bar { height: 8px; background: #e8e8e8; border-radius: 4px; overflow: hidden; }
  .progress-fill {
    height: 100%; border-radius: 4px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    background: linear-gradient(90deg, #2d6a4f, #52b788, #c17f59);
    background-size: 200% 100%; animation: shimmer 2s linear infinite;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .progress-info { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .progress-label { font-size: 13px; color: var(--text-light); }
  .progress-emoji { font-size: 18px; transition: all 0.3s; }
  .progress-count { font-size: 13px; font-weight: 600; color: var(--primary); }

  /* ===== INTRO CARD ===== */
  .intro { padding: 16px; }
  .intro-card {
    background: var(--card); border-radius: var(--radius); padding: 20px;
    box-shadow: var(--shadow); border-left: 4px solid var(--accent);
  }
  .intro-card p { font-size: 13.5px; color: var(--text-light); line-height: 1.8; }
  .intro-card .highlight { color: var(--primary); font-weight: 600; }
  .intro-card .time { display: flex; align-items: center; gap: 6px; margin-top: 10px; font-size: 13px; color: var(--accent); font-weight: 500; }

  /* ===== SECTION DIVIDER ===== */
  .section-divider {
    display: flex; align-items: center; gap: 10px; padding: 20px 16px 10px;
  }
  .section-icon {
    width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center;
    justify-content: center; font-size: 20px; flex-shrink: 0;
  }
  .section-label h3 { font-size: 15px; font-weight: 600; color: var(--text); }
  .section-label p { font-size: 12px; color: var(--text-light); }
  .section-progress { margin-left: auto; font-size: 12px; color: var(--text-light); font-weight: 500; }

  /* ===== QUESTION CARD ===== */
  .q-card {
    background: var(--card); border-radius: var(--radius); padding: 18px;
    margin: 0 16px 10px; box-shadow: var(--shadow);
    border: 1.5px solid transparent; transition: all 0.3s;
  }
  .q-card.answered { border-color: var(--primary-light); }
  .q-card.answered .q-status { opacity: 1; }
  .q-card.focused { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light), var(--shadow); }
  .q-card.focused .q-num { color: var(--accent); }
  .q-card.error {
    border-color: var(--error); background: var(--error-light);
    animation: shake 0.5s cubic-bezier(.36,.07,.19,.97);
  }
  @keyframes shake {
    10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(4px)}
    30%,50%,70%{transform:translateX(-6px)} 40%,60%{transform:translateX(6px)}
  }
  .q-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .q-num { font-size: 11px; color: var(--primary); font-weight: 700; letter-spacing: 0.5px; }
  .q-status { font-size: 14px; opacity: 0; transition: opacity 0.3s; }
  .q-text { font-size: 15px; font-weight: 500; line-height: 1.5; margin-bottom: 3px; }
  .q-text-en { font-size: 12.5px; color: var(--text-light); margin-bottom: 10px; }
  .q-note { font-size: 11px; color: var(--accent); margin-bottom: 8px; font-style: italic; }
  .error-hint { font-size: 12px; color: var(--error); margin-top: 8px; display: none; }
  .q-card.error .error-hint { display: block; }

  /* ===== OPTIONS ===== */
  .options { display: flex; gap: 6px; }
  .opt-btn {
    flex: 1; text-align: center; padding: 10px 2px; border: 2px solid #eee;
    border-radius: 10px; cursor: pointer; transition: all 0.25s; background: #fafafa;
    -webkit-tap-highlight-color: transparent; position: relative; overflow: hidden;
  }
  .opt-btn::after {
    content: ''; position: absolute; inset: 0; background: var(--primary);
    opacity: 0; transition: opacity 0.25s; border-radius: 8px;
  }
  .opt-btn:active { transform: scale(0.93); }
  .opt-btn .num { font-size: 18px; font-weight: 700; color: var(--text); display: block; position: relative; z-index: 1; }
  .opt-btn .label { font-size: 9.5px; color: var(--text-light); display: block; margin-top: 1px; position: relative; z-index: 1; }
  .opt-btn.selected { border-color: var(--primary); background: var(--primary-light); }
  .opt-btn.selected .num { color: var(--primary); }

  /* ===== GENDER ===== */
  .gender-section { padding: 20px 16px; }
  .gender-card {
    background: var(--card); border-radius: var(--radius); padding: 28px 24px;
    box-shadow: var(--shadow); text-align: center;
  }
  .gender-card .icon { font-size: 40px; margin-bottom: 12px; }
  .gender-card h3 { font-size: 18px; margin-bottom: 4px; }
  .gender-card p { font-size: 13px; color: var(--text-light); margin-bottom: 20px; }
  .gender-btns { display: flex; gap: 12px; }
  .gender-btn {
    flex: 1; padding: 16px; border: 2px solid var(--border); border-radius: 12px;
    font-size: 18px; cursor: pointer; background: var(--card); transition: all 0.25s;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .gender-btn span { font-size: 13px; color: var(--text-light); }
  .gender-btn:active { transform: scale(0.96); }
  .gender-btn.selected { border-color: var(--primary); background: var(--primary-light); }

  /* ===== SUBMIT ===== */
  .submit-wrap { padding: 24px 16px 40px; }
  .submit-btn {
    width: 100%; padding: 16px; border: none; border-radius: var(--radius);
    background: linear-gradient(135deg, #1b4332, #2d6a4f);
    color: white; font-size: 17px; font-weight: 600; cursor: pointer;
    transition: all 0.25s; position: relative; overflow: hidden;
  }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn .arrow { display: inline-block; margin-left: 8px; transition: transform 0.3s; }
  .submit-btn:hover .arrow { transform: translateX(4px); }
  .unanswered-hint {
    text-align: center; margin-top: 12px; font-size: 13px; color: var(--error);
    display: none; animation: fadeIn 0.3s;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }

  /* ===== RESULTS ===== */
  .results { display: none; }
  .result-hero {
    background: linear-gradient(160deg, #1b4332, #2d6a4f, #52796f);
    color: white; padding: 40px 24px; text-align: center;
  }
  .result-hero .big-emoji { font-size: 64px; margin-bottom: 12px; animation: pop 0.6s cubic-bezier(0.68,-0.55,0.265,1.55); }
  @keyframes pop { 0%{transform:scale(0)} 100%{transform:scale(1)} }
  .result-hero h2 { font-size: 28px; font-weight: 700; }
  .result-hero .type-en { font-size: 15px; opacity: 0.8; margin-top: 4px; }
  .result-hero .desc { font-size: 14px; opacity: 0.9; margin-top: 14px; line-height: 1.7; max-width: 320px; margin-inline: auto; }

  .result-body { padding: 16px; }

  .r-card {
    background: var(--card); border-radius: var(--radius); padding: 20px;
    margin-bottom: 12px; box-shadow: var(--shadow);
  }
  .r-card h3 { font-size: 16px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .r-card h3 .icon { font-size: 20px; }

  /* Score bars */
  .score-row { display: flex; align-items: center; margin-bottom: 10px; }
  .score-label { width: 56px; font-size: 12.5px; font-weight: 600; flex-shrink: 0; }
  .score-bar-bg { flex: 1; height: 22px; background: #f0f0f0; border-radius: 11px; overflow: hidden; margin: 0 8px; position: relative; }
  .score-bar-fg { height: 100%; border-radius: 11px; transition: width 1s cubic-bezier(0.4,0,0.2,1); position: relative; }
  .score-val { width: 36px; text-align: right; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .score-tag {
    font-size: 10px; padding: 2px 8px; border-radius: 6px; font-weight: 600;
    white-space: nowrap; margin-left: 4px; min-width: 36px; text-align: center;
  }
  .tag-yes { background: #fecaca; color: #991b1b; }
  .tag-tend { background: #fef3c7; color: #92400e; }
  .tag-no { background: #d1fae5; color: #065f46; }

  /* ===== SERVICE FUNNEL ===== */
  .funnel { padding: 0 16px 20px; }
  .funnel-title { font-size: 16px; font-weight: 600; text-align: center; margin-bottom: 16px; color: var(--text); }

  .service-card {
    background: var(--card); border-radius: var(--radius); padding: 20px;
    margin-bottom: 12px; box-shadow: var(--shadow); border: 1.5px solid var(--border);
    cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden;
  }
  .service-card:active { transform: scale(0.98); }
  .service-card.featured { border-color: var(--accent); }
  .service-card.featured::before {
    content: '推荐 HOT'; position: absolute; top: 12px; right: -28px;
    background: var(--accent); color: white; font-size: 10px; font-weight: 700;
    padding: 3px 32px; transform: rotate(35deg); letter-spacing: 0.5px;
  }
  .service-card .s-icon { font-size: 28px; margin-bottom: 8px; }
  .service-card h4 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .service-card p { font-size: 12.5px; color: var(--text-light); line-height: 1.6; }
  .service-card .price {
    display: inline-block; margin-top: 10px; padding: 4px 14px;
    background: var(--primary-light); color: var(--primary); border-radius: 8px;
    font-size: 13px; font-weight: 600;
  }
  .service-card .free-tag {
    display: inline-block; margin-top: 10px; padding: 4px 14px;
    background: #dbeafe; color: #1e40af; border-radius: 8px;
    font-size: 13px; font-weight: 600;
  }

  .contact-bar {
    background: var(--card); border-radius: var(--radius); padding: 16px 20px;
    margin: 12px 16px; box-shadow: var(--shadow); text-align: center;
  }
  .contact-bar p { font-size: 13px; color: var(--text-light); margin-bottom: 10px; }
  .contact-links { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .contact-link {
    padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 500;
    text-decoration: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
  }
  .contact-link.tg { background: #e3f2fd; color: #1565c0; }
  .contact-link.wa { background: #e8f5e9; color: #2e7d32; }
  .contact-link.web { background: #f3e5f5; color: #7b1fa2; }

  .disclaimer {
    font-size: 11px; color: var(--text-light); text-align: center;
    padding: 20px 16px; line-height: 1.7; border-top: 1px solid var(--border); margin-top: 12px;
  }

  .hidden { display: none !important; }

  /* ===== BRAND ELEMENTS ===== */
  .brand-name { font-family: "STKaiti", "KaiTi", "楷体", serif; }
  .brand-watermark {
    position: fixed; bottom: 16px; right: 16px; font-size: 10px; color: rgba(45,106,79,0.15);
    font-family: "STKaiti", "KaiTi", serif; letter-spacing: 2px; z-index: 50; pointer-events: none;
    writing-mode: vertical-rl;
  }
  .brand-seal {
    display: inline-flex; align-items: center; justify-content: center;
    width: 48px; height: 48px; border: 2px solid rgba(255,255,255,0.4);
    border-radius: 8px; font-family: "STKaiti","KaiTi",serif;
    font-size: 20px; font-weight: 700; letter-spacing: 2px; line-height: 1.1;
    color: rgba(255,255,255,0.9); transform: rotate(-5deg); margin-bottom: 10px;
  }
  .result-brand-bar {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 8px 0; margin-top: 16px; opacity: 0.7; font-size: 12px;
  }
  .result-brand-bar .line { flex: 1; max-width: 40px; height: 1px; background: rgba(255,255,255,0.4); }
  .report-header {
    display: flex; align-items: center; gap: 10px; padding-bottom: 12px;
    margin-bottom: 14px; border-bottom: 1px solid var(--border);
  }
  .report-header .rh-seal {
    width: 36px; height: 36px; border: 1.5px solid var(--primary); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: "STKaiti","KaiTi",serif; font-size: 14px; font-weight: 700;
    color: var(--primary); transform: rotate(-5deg); flex-shrink: 0; line-height: 1.1;
  }
  .report-header .rh-text h3 { font-size: 15px; color: var(--primary); margin: 0; }
  .report-header .rh-text p { font-size: 11px; color: var(--text-light); margin: 0; }

  .kbd-hint {
    display: flex; align-items: center; gap: 6px; margin-top: 10px;
    padding: 8px 12px; background: #f0fdf4; border-radius: 8px; font-size: 12px; color: var(--primary);
  }
  .kbd-hint kbd {
    display: inline-block; padding: 2px 7px; background: white; border: 1px solid #ccc;
    border-radius: 4px; font-family: monospace; font-size: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.1);
  }
</style>
</head>

<div id="app">
  <div class="header">
    <div class="brand-seal">鸿儒</div>
    <h1><span class="brand-name">鸿儒中医</span> · 体质辨识</h1>
    <div class="subtitle">HongRu TCM · Constitution Assessment</div>

        <div class="gender-btn" onclick="selectGender('female', this)">♀<span>女 Female</span></div>
      </div>
    </div>

  <div id="questionnaire" class="hidden"></div>
  <div class="submit-wrap hidden" id="submitWrap">

    <div class="unanswered-hint" id="unansweredHint"></div>
  </div>
  <div class="results" id="results"></div>
  <div class="brand-watermark">鸿儒中医 HongRu TCM</div>
</div>

      items:[

const LABELS = [{s:1,zh:"没有",en:"No"},{s:2,zh:"很少",en:"Rare"},{s:3,zh:"有时",en:"Some"},{s:4,zh:"经常",en:"Often"},{s:5,zh:"总是",en:"Always"}];
const GROUPS = [

const EMOJIS = ['🌱','🌿','🍀','🌳','🌲','🎋','🎍','🌴','🎄','🌺'];

let gender=null, answers={}, totalQ=0, allQKeys=[], focusIdx=0;

function selectGender(g, el) {
  gender = g;
  document.querySelectorAll('.gender-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  setTimeout(()=>{
    document.getElementById('genderSection').classList.add('hidden');
    renderQ();
    document.getElementById('questionnaire').classList.remove('hidden');
    document.getElementById('submitWrap').classList.remove('hidden');
    updateProgress();
  }, 300);
}

function renderQ() {
  const wrap = document.getElementById('questionnaire');
  let html = '', qIdx = 0, gIdx = 0;
  allQKeys = [];

  for (const sec of DATA.sections) {
    const grp = GROUPS[gIdx];
    if (grp && grp.ids[0] === sec.id) {
      html += `<div class="section-divider"><div class="section-icon" style="background:${grp.bg}">${grp.icon}</div><div class="section-label"><h3>${grp.label}</h3><p>${grp.en}</p></div></div>`;
      gIdx++;
    }

    for (let i = 0; i < sec.items.length; i++) {
      const item = sec.items[i];
      if (item.g && item.g !== gender) continue;
      qIdx++;
      const key = sec.id+'_'+i;
      allQKeys.push(key);
      const note = item.r ? '<div class="q-note">★ 逆向计分 Reverse scoring</div>' : '';
      const gNote = item.g ? `<div class="q-note">${item.g==='female'?'♀ 仅女性 Female only':'♂ 仅男性 Male only'}</div>` : '';

      html += `<div class="q-card" id="card_${key}" data-idx="${qIdx-1}" onclick="focusQuestion(${qIdx-1})">
        <div class="q-top"><span class="q-num">Q${qIdx} · ${sec.name}</span><span class="q-status">✓</span></div>
        <div class="q-text">${item.q}</div>
        <div class="q-text-en">${item.en}</div>
        ${note}${gNote}
        <div class="options">${LABELS.map(lb=>`<div class="opt-btn" onclick="ans('${key}',${lb.s},this)"><span class="num">${lb.s}</span><span class="label">${lb.zh}</span></div>`).join('')}</div>
        <div class="error-hint">⬆ 请选择一个选项 Please select an option</div>
      </div>`;
    }
  }

  const kbdHint = window.matchMedia('(pointer:fine)').matches
    ? `<div class="kbd-hint">⌨️ 电脑用户提示：按键盘 <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd><kbd>4</kbd><kbd>5</kbd> 可快速作答，自动跳转下一题</div>`
    : `<div class="kbd-hint">💡 提示：点击选项后会自动跳到下一题</div>`;

  wrap.innerHTML = `<div class="intro"><div class="intro-card"><p><strong class="brand-name">鸿儒中医</strong>提醒您：请根据您<span class="highlight">近一年</span>的真实体验和感觉作答。每题选择最符合的数字，<span class="highlight">1=没有，5=总是</span>。本测评严格遵循国家标准，结果科学可信。</p><div class="time">⏱ 约3-5分钟 · 鸿儒中医为您的健康护航</div>${kbdHint}</div></div>` + html;
  totalQ = qIdx;
  focusIdx = 0;
  setTimeout(() => focusQuestion(0), 400);
}

function ans(key, score, el) {
  answers[key] = score;
  const card = document.getElementById('card_'+key);
  card.classList.add('answered');
  card.classList.remove('error');
  card.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  updateProgress();

  // Auto-advance to next unanswered question
  const currentIdx = allQKeys.indexOf(key);
  let nextIdx = -1;

  // First try: find next unanswered after current
  for (let i = currentIdx + 1; i < allQKeys.length; i++) {
    if (!(allQKeys[i] in answers)) { nextIdx = i; break; }
  }
  // Fallback: find any unanswered before current
  if (nextIdx === -1) {
    for (let i = 0; i < currentIdx; i++) {
      if (!(allQKeys[i] in answers)) { nextIdx = i; break; }
    }
  }

  if (nextIdx !== -1) {
    setTimeout(() => focusQuestion(nextIdx), 250);
  } else if (Object.keys(answers).length === totalQ) {
    // All answered, scroll to submit
    setTimeout(() => {
      document.getElementById('submitWrap').scrollIntoView({ behavior:'smooth', block:'center' });
    }, 300);
  }
}

function focusQuestion(idx) {
  if (idx < 0 || idx >= allQKeys.length) return;
  focusIdx = idx;
  // Remove focus from all
  document.querySelectorAll('.q-card.focused').forEach(c => c.classList.remove('focused'));
  // Add focus to target
  const card = document.getElementById('card_' + allQKeys[idx]);
  if (card) {
    card.classList.add('focused');
    card.scrollIntoView({ behavior:'smooth', block:'center' });
  }
}

// Keyboard support: press 1-5 to answer focused question
document.addEventListener('keydown', function(e) {
  // Only work when questionnaire is visible
  if (document.getElementById('questionnaire').classList.contains('hidden')) return;
  // Only work when results not shown
  if (document.getElementById('results').style.display === 'block') return;

  const num = parseInt(e.key);
  if (num >= 1 && num <= 5) {
    e.preventDefault();
    const key = allQKeys[focusIdx];
    if (!key) return;
    const card = document.getElementById('card_' + key);
    if (!card) return;
    const btns = card.querySelectorAll('.opt-btn');
    if (btns[num - 1]) {
      ans(key, num, btns[num - 1]);
    }
  }
  // Arrow keys to navigate questions
  if (e.key === 'ArrowDown' || e.key === 'j') {
    e.preventDefault();
    if (focusIdx < allQKeys.length - 1) focusQuestion(focusIdx + 1);
  }
  if (e.key === 'ArrowUp' || e.key === 'k') {
    e.preventDefault();
    if (focusIdx > 0) focusQuestion(focusIdx - 1);
  }
  // Enter to submit
  if (e.key === 'Enter' && Object.keys(answers).length === totalQ) {
    e.preventDefault();
    handleSubmit();
  }
});

function updateProgress() {
  const n = Object.keys(answers).length;
  const pct = totalQ>0 ? Math.round(n/totalQ*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressCount').textContent = `${n}/${totalQ}`;
  const eidx = Math.min(Math.floor(pct/10), EMOJIS.length-1);
  document.getElementById('progressEmoji').textContent = EMOJIS[eidx];
  document.getElementById('progressLabel').textContent = n===totalQ ? '全部完成！点击下方提交 ✨' : `已完成 ${pct}%`;
}

// ===== IMPROVEMENT 1: Highlight unanswered on submit =====
function handleSubmit() {
  // Collect all question keys
  const allKeys = [];
  for (const sec of DATA.sections) {
    sec.items.forEach((item, i) => {
      if (item.g && item.g !== gender) return;
      allKeys.push(sec.id+'_'+i);
    });
  }

  const missing = allKeys.filter(k => !(k in answers));

  if (missing.length > 0) {
    // Clear previous errors
    document.querySelectorAll('.q-card.error').forEach(c => c.classList.remove('error'));

    // Mark unanswered cards
    missing.forEach(k => {
      const card = document.getElementById('card_'+k);
      if (card) card.classList.add('error');
    });

    // Show hint
    const hint = document.getElementById('unansweredHint');
    hint.textContent = `还有 ${missing.length} 题未回答，已用红色标出 ↑`;
    hint.style.display = 'block';

    // Scroll to first unanswered
    const firstMissing = document.getElementById('card_'+missing[0]);
    if (firstMissing) {
      firstMissing.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    return;
  }

  document.getElementById('unansweredHint').style.display = 'none';
  calculateResults();
}

function calculateResults() {
  const results = [];
  for (const sec of DATA.sections) {
    let raw=0, cnt=0;
    sec.items.forEach((item,i) => {
      if (item.g && item.g !== gender) return;
      let v = answers[sec.id+'_'+i] || 3;
      if (item.r) v = 6-v;
      raw += v; cnt++;
    });
    const tf = Math.round(((raw-cnt)/(cnt*4))*1000)/10;
    results.push({...sec, raw, cnt, tf});
  }

  const ph = results[0], bias = results.slice(1);
  const a30 = bias.every(r=>r.tf<30), a40 = bias.every(r=>r.tf<40);
  ph.result = ph.tf>=60&&a30 ? "是" : ph.tf>=60&&a40 ? "基本是" : "否";
  for (const r of bias) r.result = r.tf>=40?"是":r.tf>=30?"倾向是":"否";

  const pos = bias.filter(r=>r.result==="是").sort((a,b)=>b.tf-a.tf);
  const tend = bias.filter(r=>r.result==="倾向是").sort((a,b)=>b.tf-a.tf);
  showResults(results, ph, pos, tend);
}
